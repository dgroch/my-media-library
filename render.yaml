# Render blueprint — https://render.com/docs/blueprint-spec
# Deploy with: New + > Blueprint, point at this repo, then fill in the
# secret env vars (NOTION_TOKEN and the NOTION_COLLECTIONS_* ids) in the
# dashboard when prompted.
services:
  - type: web
    name: asset-library
    runtime: node
    plan: starter # always-on (no cold starts), ~$7/mo
    region: singapore # closest Render region to Australia
    branch: main
    # The app deploy no longer re-embeds the manifest. fetch:index pulls the
    # prebuilt index from R2 (built+uploaded by the asset-index-reindex cron
    # job below); it is non-fatal, so deploys never depend on OpenAI/Notion.
    buildCommand: npm ci && npm run fetch:index && npm run build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Secret — set in the Render dashboard (not committed).
      - key: NOTION_TOKEN
        sync: false
      # Secret — embeddings provider key (query-time embeddings for search).
      - key: OPENAI_API_KEY
        sync: false
      # The Brand Asset Manifest database.
      - key: NOTION_ASSETS_DATABASE_ID
        value: 357fdc24-425f-81ed-805c-c4f9aff0665f
      # Collections database — produced by `npm run setup:collections`.
      # Paste the values it prints into the dashboard.
      - key: NOTION_COLLECTIONS_DATABASE_ID
        sync: false
      - key: NOTION_COLLECTIONS_DATA_SOURCE_ID
        sync: false
      - key: NOTION_COLLECTIONS_PARENT_PAGE_ID
        value: 352fdc24-425f-8088-930c-c5c1ff6afa95
      # Asset uploads (POST /api/assets). Secret bearer token consumers send;
      # uploads stay disabled (503) until it is set. Run `npm run setup:upload`
      # once before enabling.
      - key: ASSET_LIBRARY_TOKEN
        sync: false
      # Public base URL the brand CDN serves uploaded originals from, e.g.
      # https://cdn.example.com/figandbloom/asset-manifest (no trailing slash).
      - key: ASSET_CDN_BASE_URL
        sync: false
      # Optional: public base URL for derived objects (PUT /api/derived, the
      # render cache tier). Leave empty to omit `url` from PUT responses.
      - key: ASSET_DERIVED_CDN_BASE_URL
        sync: false
      # R2 — the prebuilt index is fetched from here at build time, and
      # uploaded originals are PUT here at runtime. A read-only token works if
      # uploads are disabled; uploads need a read/WRITE token.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false

  # Re-index job: rebuilds the semantic search index and uploads it to R2 on a
  # schedule, fully independent of app deploys. Runs build:index (which now
  # retries rate limits and paces batches) then upload:index, then pings the
  # web service's deploy hook to publish the refreshed index.
  - type: cron
    name: asset-index-reindex
    runtime: node
    plan: starter
    region: singapore
    branch: main
    schedule: "0 18 * * *" # daily at 18:00 UTC (~04:00 AEST); adjust as needed
    buildCommand: npm ci
    startCommand: npm run reindex
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NOTION_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NOTION_ASSETS_DATABASE_ID
        value: 357fdc24-425f-81ed-805c-c4f9aff0665f
      # R2 (write) — destination bucket for the uploaded index.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      # Web service deploy hook — pinged after upload so the new index goes live.
      - key: RENDER_DEPLOY_HOOK_URL
        sync: false

  # Video frames worker: drains the durable R2 queue (POST /api/videos with
  # choice=frames enqueues there). Runs the extract → select → cleanup → ingest
  # pipeline off the web service, so a slow/large clip never blocks uploads and
  # jobs survive redeploys. Single always-on worker, claims one job at a time.
  - type: worker
    name: video-worker
    runtime: node
    plan: starter
    region: singapore
    branch: main
    # No `next build` — the worker runs the TypeScript pipeline via tsx.
    buildCommand: npm ci
    startCommand: npm run worker:video
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_ASSETS_DATABASE_ID
        value: 357fdc24-425f-81ed-805c-c4f9aff0665f
      # Embeddings (each ingested frame is embedded for search).
      - key: OPENAI_API_KEY
        sync: false
      # Gemini — frame scoring, caption/chrome cleanup, and AI manifesting.
      - key: GEMINI_API_KEY
        sync: false
      # Where frames are stored + served (must match the web service exactly).
      - key: ASSET_CDN_BASE_URL
        sync: false
      - key: ASSET_STORAGE_PREFIX
        sync: false
      # Brand R2 (read/WRITE) — stores the cleaned frames. Same as the web
      # service's asset upload creds.
      - key: ASSET_R2_ACCOUNT_ID
        sync: false
      - key: ASSET_R2_ACCESS_KEY_ID
        sync: false
      - key: ASSET_R2_SECRET_ACCESS_KEY
        sync: false
      - key: ASSET_R2_BUCKET
        sync: false
      # Queue storage (job records + source clips). Defaults to the brand R2
      # creds above under the `video-queue/` prefix; set VIDEO_QUEUE_* to use a
      # separate (private) bucket. R2_* is the final fallback.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
